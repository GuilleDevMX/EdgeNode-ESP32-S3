name: CD - Continuous Deployment (Release)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build React Dashboard (to data/www)
      working-directory: ./frontend
      run: npm run build

    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v5
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio
        
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
        
    - name: Build Firmware
      run: pio run -e esp32s3
      
    - name: Build LittleFS Image
      run: pio run -e esp32s3 -t buildfs
      
    - name: Prepare Artifacts
      run: |
        mkdir -p release_artifacts
        cp .pio/build/esp32s3/firmware.bin release_artifacts/EdgeSecOps_firmware_${{ github.ref_name }}.bin
        cp .pio/build/esp32s3/littlefs.bin release_artifacts/EdgeSecOps_littlefs_${{ github.ref_name }}.bin

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: EdgeSecOps ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release_artifacts/EdgeSecOps_firmware_${{ github.ref_name }}.bin
          release_artifacts/EdgeSecOps_littlefs_${{ github.ref_name }}.bin
